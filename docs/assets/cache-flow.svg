<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">ib DNS cache flow</title>
  <desc id="desc">A fixed-layout flow diagram showing how ib uses zone completion cache, zone serial cache, SQLite allrecords cache, and background prewarming.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbe3ee"/>
      <stop offset="100%" stop-color="#aebdce"/>
    </linearGradient>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#d9e2ec"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce6f0"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9ecff"/>
      <stop offset="100%" stop-color="#9fc7f6"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eee7ff"/>
      <stop offset="100%" stop-color="#c6b6f3"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff8e9"/>
      <stop offset="100%" stop-color="#9bd9ad"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6c8"/>
      <stop offset="100%" stop-color="#f4aa67"/>
    </linearGradient>
    <linearGradient id="pill-purple-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd2ff"/>
      <stop offset="100%" stop-color="#b9a5ec"/>
    </linearGradient>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#6d28d9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#c2410c"/>
    </marker>
    <style>
      .bg { fill: url(#bg-grad); }
      .panel { fill: url(#panel-grad); stroke: #94a3b8; stroke-width: 1.5; filter: url(#shadow); }
      .card, .card-blue, .card-purple, .card-green, .card-orange {
        transform-box: fill-box;
        transform-origin: center;
        transform: scale(0.955);
      }
      .card { fill: url(#card-grad); stroke: #94a3b8; stroke-width: 1.5; }
      .card-blue { fill: url(#blue-grad); stroke: #6097d4; stroke-width: 1.5; }
      .card-purple { fill: url(#purple-grad); stroke: #9b83d6; stroke-width: 1.5; }
      .card-green { fill: url(#green-grad); stroke: #6fb982; stroke-width: 1.5; }
      .card-orange { fill: url(#orange-grad); stroke: #d48945; stroke-width: 1.5; }
      .pill-blue { fill: #c6dcf4; stroke: #93b7dc; stroke-width: 1; }
      .pill-purple { fill: url(#pill-purple-grad); stroke: #a78bdb; stroke-width: 1; }
      .pill-green { fill: #bde9c9; stroke: #86c99a; stroke-width: 1; }
      .pill-orange { fill: #ffd3a7; stroke: #e9a15f; stroke-width: 1; }
      .title { fill: #0f172a; font: 700 36px Arial, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #334155; font: 400 18px Arial, sans-serif; letter-spacing: 0; }
      .lane { fill: #1e293b; font: 700 14px Arial, sans-serif; letter-spacing: 1.2px; }
      .label { fill: #0f172a; font: 700 17px Arial, sans-serif; letter-spacing: 0; }
      .body { fill: #334155; font: 400 14px Arial, sans-serif; letter-spacing: 0; }
      .small { fill: #475569; font: 400 12px Arial, sans-serif; letter-spacing: 0; }
      .badge { fill: #1e293b; font: 700 11px Arial, sans-serif; letter-spacing: 0.4px; }
      .blue-line { fill: none; stroke: #1d4ed8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .purple-line { fill: none; stroke: #6d28d9; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); }
      .green-line { fill: none; stroke: #15803d; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .orange-line { fill: none; stroke: #c2410c; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-orange); }
      .muted-line { fill: none; stroke: #64748b; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="980"/>
  <rect class="panel" x="40" y="36" width="1360" height="908" rx="18"/>

  <text class="title" x="80" y="92">ib DNS Cache Flow</text>
  <text class="subtitle" x="80" y="124">Searches stay fast by validating cached records with SOA serials; writes clear caches and start a silent prewarm.</text>

  <line class="muted-line" x1="80" y1="160" x2="1360" y2="160"/>
  <text class="lane" x="80" y="194">FOREGROUND SEARCH AND LIST</text>

  <rect class="card-blue" x="80" y="220" width="220" height="104" rx="6"/>
  <text class="label" x="104" y="254">Command starts</text>
  <text class="body" x="104" y="282">ib dns search</text>
  <text class="body" x="104" y="304">ib dns list</text>

  <rect class="card" x="348" y="220" width="228" height="104" rx="6"/>
  <text class="label" x="372" y="254">Resolve context</text>
  <text class="body" x="372" y="282">profile, server, view</text>
  <text class="body" x="372" y="304">active zone scope</text>

  <rect class="card-purple" x="624" y="220" width="250" height="104" rx="6"/>
  <text class="label" x="648" y="254">Zone serial lookup</text>
  <text class="body" x="648" y="282">zone_serial_cache</text>
  <text class="body" x="648" y="304">view scoped zone list</text>
  <rect class="pill-purple" x="780" y="238" width="70" height="24" rx="7"/>
  <text class="badge" x="799" y="254">30 SEC</text>

  <rect class="card-orange" x="922" y="220" width="218" height="104" rx="6"/>
  <text class="label" x="946" y="254">WAPI fallback</text>
  <text class="body" x="946" y="282">zone_auth query</text>
  <text class="body" x="946" y="304">paged results</text>

  <rect class="card-green" x="1188" y="220" width="172" height="104" rx="6"/>
  <text class="label" x="1212" y="254">Zone set</text>
  <text class="body" x="1212" y="282">skip secondary</text>
  <text class="body" x="1212" y="304">sort by fqdn</text>

  <path class="blue-line" d="M 300 272 L 348 272"/>
  <path class="blue-line" d="M 576 272 L 624 272"/>
  <path class="purple-line" d="M 874 272 L 922 272"/>
  <path class="green-line" d="M 1140 272 L 1188 272"/>
  <path class="green-line" d="M 874 292 C 940 374 1106 374 1200 324"/>

  <text class="small" x="888" y="250">cache miss</text>
  <text class="small" x="1012" y="372">cache hit skips WAPI</text>

  <text class="lane" x="80" y="382">PER-ZONE RECORD CACHE VALIDATION</text>

  <rect class="card" x="80" y="408" width="244" height="116" rx="6"/>
  <text class="label" x="104" y="442">Build cache key</text>
  <text class="body" x="104" y="470">server + WAPI version</text>
  <text class="body" x="104" y="492">DNS view + zone</text>

  <rect class="card-purple" x="372" y="408" width="244" height="116" rx="6"/>
  <text class="label" x="396" y="442">SQLite validation</text>
  <text class="body" x="396" y="470">zone_record_cache</text>
  <text class="body" x="396" y="492">serial must match</text>

  <rect class="card-green" x="664" y="384" width="250" height="92" rx="6"/>
  <text class="label" x="688" y="418">Serial matches</text>
  <text class="body" x="688" y="446">search locally in SQLite</text>

  <rect class="card-orange" x="664" y="504" width="250" height="92" rx="6"/>
  <text class="label" x="688" y="538">Serial changed</text>
  <text class="body" x="688" y="566">fetch allrecords from WAPI</text>

  <rect class="card-purple" x="962" y="384" width="232" height="92" rx="6"/>
  <text class="label" x="986" y="418">search_entries</text>
  <text class="body" x="986" y="446">name, value, comment</text>

  <rect class="card-purple" x="962" y="504" width="232" height="92" rx="6"/>
  <text class="label" x="986" y="538">Normalize + write</text>
  <text class="body" x="986" y="566">replace per-zone rows</text>

  <rect class="card-green" x="1242" y="444" width="118" height="92" rx="6"/>
  <text class="label" x="1266" y="478">Result</text>
  <text class="body" x="1266" y="506">dedupe</text>

  <path class="blue-line" d="M 324 466 L 372 466"/>
  <path class="green-line" d="M 616 454 L 664 432"/>
  <path class="orange-line" d="M 616 478 L 664 550"/>
  <path class="green-line" d="M 914 430 L 962 430"/>
  <path class="orange-line" d="M 914 550 L 962 550"/>
  <path class="purple-line" d="M 1194 430 C 1230 430 1230 490 1242 490"/>
  <path class="purple-line" d="M 1194 550 C 1230 550 1230 490 1242 490"/>

  <text class="lane" x="80" y="660">COMPLETION CACHE</text>

  <rect class="card-blue" x="80" y="686" width="240" height="108" rx="6"/>
  <text class="label" x="104" y="720">Zone completion</text>
  <text class="body" x="104" y="748">ib dns zone use</text>
  <text class="body" x="104" y="770">ib dns list zone</text>

  <rect class="card-purple" x="368" y="686" width="276" height="108" rx="6"/>
  <text class="label" x="392" y="720">zone-completion-cache.json</text>
  <text class="body" x="392" y="748">stores view + zone names</text>
  <text class="body" x="392" y="770">filters locally by prefix</text>
  <rect class="pill-purple" x="540" y="704" width="78" height="24" rx="7"/>
  <text class="badge" x="558" y="720">300 SEC</text>

  <rect class="card-orange" x="692" y="686" width="190" height="108" rx="6"/>
  <text class="label" x="716" y="720">Cache miss</text>
  <text class="body" x="716" y="748">query zone_auth</text>
  <text class="body" x="716" y="770">write JSON cache</text>

  <path class="purple-line" d="M 320 740 L 368 740"/>
  <path class="orange-line" d="M 644 740 L 692 740"/>
  <path class="purple-line" d="M 692 772 C 632 838 420 838 368 772"/>

  <text class="lane" x="928" y="660">INVALIDATION AND PREWARM</text>

  <rect class="card-orange" x="928" y="686" width="186" height="108" rx="6"/>
  <text class="label" x="952" y="720">Successful write</text>
  <text class="body" x="952" y="748">create, edit, delete</text>
  <text class="body" x="952" y="770">zone mutations</text>

  <rect class="card-orange" x="1162" y="686" width="198" height="108" rx="6"/>
  <text class="label" x="1186" y="720">Clear caches</text>
  <text class="body" x="1186" y="748">remove allrecords dir</text>
  <text class="body" x="1186" y="770">remove completion JSON</text>

  <rect class="card-green" x="1046" y="830" width="314" height="84" rx="6"/>
  <text class="label" x="1070" y="864">Silent prewarm</text>
  <text class="body" x="1070" y="892">hidden command + prewarm.lock, stale after 600 sec</text>

  <path class="orange-line" d="M 1114 740 L 1162 740"/>
  <path class="green-line" d="M 1261 794 L 1261 830"/>
  <path class="green-line" d="M 1046 872 C 946 850 922 772 882 752"/>

  <text class="small" x="80" y="906">Cache files are private: ~/.ib is mode 0700; cache database and JSON files are written mode 0600 when possible.</text>
</svg>
