<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">ib cache lookup animation</title>
  <desc id="desc">A short looping animation that explains how ib checks the local SQLite cache, validates the zone SOA serial, returns cached records on a hit, or fetches allrecords from Infoblox and updates the cache on a miss.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182235"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123624"/>
      <stop offset="100%" stop-color="#0f2a1c"/>
    </linearGradient>
    <linearGradient id="wapi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12304f"/>
      <stop offset="100%" stop-color="#0b2440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2 1.5 L 7 4 L 2 6.5 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2 1.5 L 7 4 L 2 6.5 Z" fill="#4ade80"/>
    </marker>
    <symbol id="icon-terminal" viewBox="0 0 24 24">
      <path d="M3 5 H21 V19 H3 Z M6 9 L9 12 L6 15 M11 15 H17"/>
    </symbol>
    <symbol id="icon-key" viewBox="0 0 24 24">
      <path d="M4 14 A4 4 0 1 0 12 14 A4 4 0 0 0 4 14 M12 14 H21 M18 14 V17 M15 14 V16"/>
    </symbol>
    <symbol id="icon-db" viewBox="0 0 24 24">
      <path d="M5 7 C5 4.8 19 4.8 19 7 V17 C19 19.2 5 19.2 5 17 Z M5 7 C5 9.2 19 9.2 19 7 M5 12 C5 14.2 19 14.2 19 12"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M4 12 L9 17 L20 6"/>
    </symbol>
    <symbol id="icon-cloud" viewBox="0 0 24 24">
      <path d="M7 18 H18 A4 4 0 0 0 18 10 A6 6 0 0 0 6.5 12 A3 3 0 0 0 7 18 Z"/>
    </symbol>
    <symbol id="icon-sync" viewBox="0 0 24 24">
      <path d="M7 8 A6 6 0 0 1 18 7 L20 9 M17 16 A6 6 0 0 1 6 17 L4 15"/>
    </symbol>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(15, 23, 42, 0.88); stroke: #334155; stroke-width: 1.5; filter: url(#shadow); shape-rendering: crispEdges; }
      .box { fill: url(#card); stroke: #475569; stroke-width: 1.5; shape-rendering: crispEdges; }
      .cache-box { fill: url(#cache); stroke: #4ade80; stroke-width: 1.7; shape-rendering: crispEdges; }
      .wapi-box { fill: url(#wapi); stroke: #38bdf8; stroke-width: 1.7; shape-rendering: crispEdges; }
      .title { fill: #f8fafc; font: 700 34px Arial, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #cbd5e1; font: 400 17px Arial, sans-serif; letter-spacing: 0; }
      .label { fill: #f8fafc; font: 700 17px Arial, sans-serif; letter-spacing: 0; }
      .body { fill: #cbd5e1; font: 400 14px Arial, sans-serif; letter-spacing: 0; }
      .small { fill: #94a3b8; font: 400 12px Arial, sans-serif; letter-spacing: 0; }
      .green { fill: #4ade80; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .blue { fill: #38bdf8; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .amber { fill: #fbbf24; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .icon { fill: none; stroke: #e2e8f0; stroke-width: 1.8; stroke-linecap: square; stroke-linejoin: miter; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 2.4; marker-end: url(#arrow); stroke-linecap: square; stroke-linejoin: miter; }
      .line-green { fill: none; stroke: #4ade80; stroke-width: 2.4; marker-end: url(#arrow-green); stroke-linecap: square; stroke-linejoin: miter; }
      .muted-line { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 8 8; }
      .packet { fill: #38bdf8; stroke: #e0f2fe; stroke-width: 1; }
      .packet-green { fill: #4ade80; stroke: #dcfce7; stroke-width: 1; }
      .pulse-target { opacity: 0.25; }
      .step { opacity: 0; }
      .hit-path { opacity: 0; }
      .miss-path { opacity: 0; }
      .progress { fill: #4ade80; }

      @keyframes step1 { 0%, 16% { opacity: 1; } 17%, 100% { opacity: 0; } }
      @keyframes step2 { 0%, 16% { opacity: 0; } 17%, 32% { opacity: 1; } 33%, 100% { opacity: 0; } }
      @keyframes step3 { 0%, 32% { opacity: 0; } 33%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes step4 { 0%, 48% { opacity: 0; } 49%, 66% { opacity: 1; } 67%, 100% { opacity: 0; } }
      @keyframes step5 { 0%, 66% { opacity: 0; } 67%, 86% { opacity: 1; } 87%, 100% { opacity: 0; } }
      @keyframes step6 { 0%, 86% { opacity: 0; } 87%, 100% { opacity: 1; } }
      @keyframes hitPath { 0%, 46% { opacity: 0; } 47%, 66% { opacity: 1; } 67%, 100% { opacity: 0; } }
      @keyframes missPath { 0%, 66% { opacity: 0; } 67%, 100% { opacity: 1; } }
      @keyframes moveRequest {
        0% { transform: translate(0, 0); opacity: 0; }
        5% { opacity: 1; }
        24% { transform: translate(250px, 0); opacity: 1; }
        32% { transform: translate(250px, 148px); opacity: 1; }
        42% { transform: translate(500px, 148px); opacity: 1; }
        50% { transform: translate(742px, 148px); opacity: 0; }
        100% { transform: translate(742px, 148px); opacity: 0; }
      }
      @keyframes moveMiss {
        0%, 64% { transform: translate(0, 0); opacity: 0; }
        68% { opacity: 1; }
        80% { transform: translate(250px, 0); opacity: 1; }
        90% { transform: translate(500px, 0); opacity: 1; }
        100% { transform: translate(500px, -148px); opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; stroke-width: 1.5; }
        50% { opacity: 0.95; stroke-width: 3; }
      }
      @keyframes fillProgress {
        0% { width: 0; }
        100% { width: 1040px; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      #step1 { animation: step1 8s linear infinite; }
      #step2 { animation: step2 8s linear infinite; }
      #step3 { animation: step3 8s linear infinite; }
      #step4 { animation: step4 8s linear infinite; }
      #step5 { animation: step5 8s linear infinite; }
      #step6 { animation: step6 8s linear infinite; }
      #hit-path { animation: hitPath 8s linear infinite; }
      #miss-path { animation: missPath 8s linear infinite; }
      #request-dot { animation: moveRequest 8s ease-in-out infinite; }
      #miss-dot { animation: moveMiss 8s ease-in-out infinite; }
      #cache-pulse { animation: pulse 1.4s ease-in-out infinite; }
      #sync-icon { transform-box: fill-box; transform-origin: center; animation: spin 1.6s linear infinite; }
      #progress-bar { animation: fillProgress 8s linear infinite; }

      @media (prefers-reduced-motion: reduce) {
        #step1, #step2, #step3, #step4, #step5, #step6, #hit-path, #miss-path, #request-dot, #miss-dot, #cache-pulse, #sync-icon, #progress-bar {
          animation: none;
        }
        #step1, #hit-path { opacity: 1; }
        #progress-bar { width: 1040px; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="660"/>
  <rect class="panel" x="40" y="38" width="1120" height="584"/>

  <text class="title" x="78" y="92">How ib caching works</text>
  <text class="subtitle" x="78" y="122">Local rows are trusted only when the scoped cache key and zone SOA serial still match.</text>

  <rect x="78" y="582" width="1040" height="8" fill="#1e293b" shape-rendering="crispEdges"/>
  <rect id="progress-bar" x="78" y="582" width="0" height="8" class="progress" shape-rendering="crispEdges"/>

  <g id="request" transform="translate(78 188)">
    <rect class="box" width="210" height="124"/>
    <use class="icon" href="#icon-terminal" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">DNS request</text>
    <text class="body" x="24" y="78">ib dns search app</text>
    <text class="small" x="24" y="100">profile + view + zone</text>
  </g>

  <g id="key" transform="translate(350 188)">
    <rect class="box" width="210" height="124"/>
    <use class="icon" href="#icon-key" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">Scoped key</text>
    <text class="body" x="24" y="78">server / WAPI</text>
    <text class="small" x="24" y="100">view and zone isolate data</text>
  </g>

  <g id="serial" transform="translate(622 188)">
    <rect class="box" width="210" height="124"/>
    <use class="icon" href="#icon-check" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">Serial check</text>
    <text class="body" x="24" y="78">SOA serial matches?</text>
    <text class="small" x="24" y="100">changed serial means refresh</text>
  </g>

  <g id="return" transform="translate(894 188)">
    <rect class="cache-box" width="210" height="124"/>
    <use class="icon" href="#icon-db" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">Cache hit</text>
    <text class="body" x="24" y="78">return SQLite rows</text>
    <text class="small" x="24" y="100">no live allrecords call</text>
  </g>

  <g id="infoblox" transform="translate(350 396)">
    <rect class="wapi-box" width="210" height="124"/>
    <use class="icon" href="#icon-cloud" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">Infoblox WAPI</text>
    <text class="body" x="24" y="78">fetch allrecords</text>
    <text class="small" x="24" y="100">only for misses or changes</text>
  </g>

  <g id="write-cache" transform="translate(622 396)">
    <rect class="cache-box" width="210" height="124"/>
    <use class="icon" href="#icon-sync" id="sync-icon" x="22" y="22" width="34" height="34"/>
    <text class="label" x="72" y="42">Write cache</text>
    <text class="body" x="24" y="78">store normalized rows</text>
    <text class="small" x="24" y="100">next matching search is local</text>
  </g>

  <path class="line" d="M288 250 H350"/>
  <path class="line" d="M560 250 H622"/>
  <path id="hit-path" class="line-green hit-path" d="M832 250 H894"/>
  <path id="miss-path" class="line miss-path" d="M727 312 V458 H560"/>
  <path class="line miss-path" d="M560 458 H622"/>
  <path class="line-green miss-path" d="M832 458 H930 V312"/>
  <path class="muted-line" d="M455 396 V326"/>
  <path class="muted-line" d="M727 396 V326"/>

  <g id="request-dot" transform="translate(288 250)">
    <rect class="packet" x="-9" y="-9" width="18" height="18" shape-rendering="crispEdges"/>
  </g>
  <g id="miss-dot" transform="translate(560 458)">
    <rect class="packet-green" x="-9" y="-9" width="18" height="18" shape-rendering="crispEdges"/>
  </g>
  <rect id="cache-pulse" class="pulse-target" x="894" y="188" width="210" height="124" fill="none" stroke="#4ade80" shape-rendering="crispEdges"/>

  <g id="step1" class="step">
    <rect x="78" y="144" width="210" height="26" fill="#12304f" stroke="#38bdf8" shape-rendering="crispEdges"/>
    <text class="blue" x="96" y="162">1. command asks for DNS data</text>
  </g>
  <g id="step2" class="step">
    <rect x="350" y="144" width="210" height="26" fill="#12304f" stroke="#38bdf8" shape-rendering="crispEdges"/>
    <text class="blue" x="368" y="162">2. cache key scopes the lookup</text>
  </g>
  <g id="step3" class="step">
    <rect x="622" y="144" width="210" height="26" fill="#4a220f" stroke="#fbbf24" shape-rendering="crispEdges"/>
    <text class="amber" x="640" y="162">3. SOA serial validates freshness</text>
  </g>
  <g id="step4" class="step">
    <rect x="894" y="144" width="210" height="26" fill="#123624" stroke="#4ade80" shape-rendering="crispEdges"/>
    <text class="green" x="912" y="162">4. hit returns local rows</text>
  </g>
  <g id="step5" class="step">
    <rect x="350" y="540" width="482" height="26" fill="#12304f" stroke="#38bdf8" shape-rendering="crispEdges"/>
    <text class="blue" x="368" y="558">5. miss or changed serial fetches Infoblox and rewrites SQLite</text>
  </g>
  <g id="step6" class="step">
    <rect x="894" y="540" width="210" height="26" fill="#123624" stroke="#4ade80" shape-rendering="crispEdges"/>
    <text class="green" x="912" y="558">6. next request is fast</text>
  </g>

  <text class="small" x="78" y="610">The real CLI also serves stale rows during active prewarm and refreshes changed zones in the background.</text>
</svg>
