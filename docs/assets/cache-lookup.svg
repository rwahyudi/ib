<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">ib cache lookup diagram</title>
  <desc id="desc">A static diagram explaining how ib checks the local SQLite cache, validates the zone SOA serial, returns cached records on a hit, or fetches allrecords from Infoblox and updates the cache on a miss.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182235"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123624"/>
      <stop offset="100%" stop-color="#0f2a1c"/>
    </linearGradient>
    <linearGradient id="wapi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12304f"/>
      <stop offset="100%" stop-color="#0b2440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2 1.5 L 7 4 L 2 6.5 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 2 1.5 L 7 4 L 2 6.5 Z" fill="#4ade80"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(15, 23, 42, 0.88); stroke: #334155; stroke-width: 1.5; filter: url(#shadow); shape-rendering: crispEdges; }
      .box { fill: url(#card); stroke: #475569; stroke-width: 1.5; shape-rendering: crispEdges; }
      .cache-box { fill: url(#cache); stroke: #4ade80; stroke-width: 1.7; shape-rendering: crispEdges; }
      .wapi-box { fill: url(#wapi); stroke: #38bdf8; stroke-width: 1.7; shape-rendering: crispEdges; }
      .badge-blue { fill: #12304f; stroke: #38bdf8; stroke-width: 1; shape-rendering: crispEdges; }
      .badge-green { fill: #123624; stroke: #4ade80; stroke-width: 1; shape-rendering: crispEdges; }
      .badge-amber { fill: #4a220f; stroke: #fbbf24; stroke-width: 1; shape-rendering: crispEdges; }
      .title { fill: #f8fafc; font: 700 34px Arial, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #cbd5e1; font: 400 17px Arial, sans-serif; letter-spacing: 0; }
      .label { fill: #f8fafc; font: 700 17px Arial, sans-serif; letter-spacing: 0; }
      .body { fill: #cbd5e1; font: 400 14px Arial, sans-serif; letter-spacing: 0; }
      .small { fill: #94a3b8; font: 400 12px Arial, sans-serif; letter-spacing: 0; }
      .green { fill: #4ade80; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .blue { fill: #38bdf8; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .amber { fill: #fbbf24; font: 700 14px Arial, sans-serif; letter-spacing: 0; }
      .number { fill: #f8fafc; font: 700 20px Arial, sans-serif; letter-spacing: 0; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 2.4; marker-end: url(#arrow); stroke-linecap: square; stroke-linejoin: miter; }
      .line-green { fill: none; stroke: #4ade80; stroke-width: 2.4; marker-end: url(#arrow-green); stroke-linecap: square; stroke-linejoin: miter; }
      .muted-line { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="660"/>
  <rect class="panel" x="40" y="38" width="1120" height="584"/>

  <text class="title" x="78" y="92">How ib caching works</text>
  <text class="subtitle" x="78" y="122">Local rows are trusted only when the scoped cache key and zone SOA serial still match.</text>

  <g id="request" transform="translate(78 188)">
    <rect class="box" width="210" height="124"/>
    <rect class="badge-blue" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">1</text>
    <text class="label" x="74" y="42">DNS request</text>
    <text class="body" x="24" y="78">ib dns search app</text>
    <text class="small" x="24" y="100">profile + view + zone</text>
  </g>

  <g id="key" transform="translate(350 188)">
    <rect class="box" width="210" height="124"/>
    <rect class="badge-blue" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">2</text>
    <text class="label" x="74" y="42">Scoped key</text>
    <text class="body" x="24" y="78">server / WAPI</text>
    <text class="small" x="24" y="100">view and zone isolate data</text>
  </g>

  <g id="serial" transform="translate(622 188)">
    <rect class="box" width="210" height="124"/>
    <rect class="badge-amber" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">3</text>
    <text class="label" x="74" y="42">Serial check</text>
    <text class="body" x="24" y="78">SOA serial matches?</text>
    <text class="small" x="24" y="100">changed serial means refresh</text>
  </g>

  <g id="return" transform="translate(894 188)">
    <rect class="cache-box" width="210" height="124"/>
    <rect class="badge-green" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">4</text>
    <text class="label" x="74" y="42">Cache hit</text>
    <text class="body" x="24" y="78">return SQLite rows</text>
    <text class="small" x="24" y="100">no live allrecords call</text>
  </g>

  <g id="infoblox" transform="translate(350 396)">
    <rect class="wapi-box" width="210" height="124"/>
    <rect class="badge-blue" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">5</text>
    <text class="label" x="74" y="42">Infoblox WAPI</text>
    <text class="body" x="24" y="78">fetch allrecords</text>
    <text class="small" x="24" y="100">only for misses or changes</text>
  </g>

  <g id="write-cache" transform="translate(622 396)">
    <rect class="cache-box" width="210" height="124"/>
    <rect class="badge-green" x="22" y="20" width="38" height="34"/>
    <text class="number" x="36" y="44">6</text>
    <text class="label" x="74" y="42">Write cache</text>
    <text class="body" x="24" y="78">store normalized rows</text>
    <text class="small" x="24" y="100">next matching search is local</text>
  </g>

  <path class="line" d="M288 250 H350"/>
  <path class="line" d="M560 250 H622"/>
  <path class="line-green" d="M832 250 H894"/>
  <path class="line" d="M727 312 V458 H560"/>
  <path class="line" d="M560 458 H622"/>
  <path class="line-green" d="M832 458 H930 V312"/>
  <path class="muted-line" d="M455 396 V326"/>
  <path class="muted-line" d="M727 396 V326"/>

  <rect x="884" y="144" width="228" height="26" class="badge-green"/>
  <text class="green" x="902" y="162">Hit path: return local rows</text>
  <rect x="350" y="540" width="482" height="26" class="badge-blue"/>
  <text class="blue" x="368" y="558">Miss path: fetch Infoblox and rewrite SQLite</text>

  <text class="small" x="78" y="610">The real CLI also serves stale rows during active prewarm and refreshes changed zones in the background.</text>
</svg>
